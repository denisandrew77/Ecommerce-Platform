version: '3.8'

services:

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service
      - inventory-service
      - payment-service
    networks:
      - micronet

  user-service:
    build: ./user-service
    depends_on:
      - user-db
    networks:
      - micronet

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - user-data:/var/lib/postgresql/data
    networks:
      - micronet

  product-service:
    build: ./product-service
    depends_on:
      - product-db
    networks:
      - micronet

  product-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - product-data:/var/lib/postgresql/data
    networks:
      - micronet

  order-service:
    build: ./order-service
    depends_on:
      - order-db
    networks:
      - micronet

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - order-data:/var/lib/postgresql/data
    networks:
      - micronet

  inventory-service:
    build: ./inventory-service
    depends_on:
      - inventory-db
    networks:
      - micronet

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - inventory-data:/var/lib/postgresql/data
    networks:
      - micronet

  payment-service:
    build: ./payment-service
    depends_on:
      - payment-db
    networks:
      - micronet

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - payment-data:/var/lib/postgresql/data
    networks:
      - micronet
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - micronet

networks:
  micronet:
    driver: bridge

volumes:
  user-data:
  product-data:
  order-data:
  inventory-data:
  payment-data: